<!-- 메뉴별 재료 레시피 기반 원가/마진 계산기 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원가계산기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:18px;font-weight:500;margin-bottom:1.25rem}
.btn{height:34px;padding:0 14px;border:1px solid #d0cfc8;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn:hover{background:#f0eeea}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn.sm{height:28px;padding:0 10px;font-size:12px}
.btn.danger{color:#A32D2D;border-color:#f09595}
.btn.danger:hover{background:#fcebeb}
.tab-bar{display:flex;gap:4px;margin-bottom:1rem;border-bottom:1px solid #e8e6e0;flex-wrap:wrap}
.tab{padding:7px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
.sep{width:1px;background:#e8e6e0;margin:4px 4px 0}
.cat-card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;margin-bottom:.85rem;overflow:hidden}
.cat-header{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;background:#fafaf8;border-bottom:1px solid #e8e6e0;cursor:pointer;user-select:none}
.cat-header.closed{border-bottom:none}
.cat-name-input{border:none;outline:none;font-size:14px;font-weight:500;font-family:inherit;background:transparent;flex:1;min-width:80px}
.cat-name-input::placeholder{color:#ccc}
.cat-body{padding:.75rem 1rem}
.tbl-wrap{overflow-x:auto;border:1px solid #e8e6e0;border-radius:10px;margin-bottom:.6rem}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 8px;text-align:left;font-weight:500;font-size:11px;color:#888;border-bottom:1px solid #e8e6e0;background:#fafaf8;white-space:nowrap}
th.r{text-align:right}
td{padding:5px 6px;border-bottom:1px solid #f0eeea;vertical-align:middle}
tr:last-child td{border-bottom:none}
tfoot td{border-top:2px solid #e8e6e0;border-bottom:none;font-weight:600;background:#fafaf8;padding:8px}
.ci{width:100%;border:1px solid transparent;border-radius:5px;padding:3px 6px;font-size:12px;font-family:inherit;background:transparent}
.ci:hover{border-color:#d0cfc8;background:#fff}
.ci:focus{outline:none;border-color:#185FA5;background:#fff}
.ci.r{text-align:right}
select.ci{cursor:pointer}
.calc-cell{text-align:right;color:#888;font-size:12px;padding-right:10px}
.menu-item{border:1px solid #e8e6e0;border-radius:12px;background:#fff;margin-bottom:.75rem;overflow:hidden}
.menu-header{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;cursor:pointer;user-select:none}
.menu-header:hover{background:#fafaf8}
.menu-name-input{border:none;outline:none;font-size:14px;font-weight:500;font-family:inherit;background:transparent;flex:1;min-width:80px}
.menu-name-input::placeholder{color:#ccc}
.header-info{display:flex;gap:12px;align-items:center;margin-left:auto;flex-shrink:0}
.hi-label{font-size:11px;color:#aaa}
.hi-val{font-size:13px;font-weight:600;color:#185FA5}
.hi-val.gray{color:#888}
.toggle-btn{font-size:12px;color:#aaa;padding:2px 6px;border:none;background:none;cursor:pointer}
.recipe-body{border-top:1px solid #e8e6e0;padding:1rem}
.margin-wrap{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.75rem}
.margin-block{border:1px solid #e8e6e0;border-radius:10px;padding:.85rem}
.mb-title{font-size:11px;font-weight:500;color:#888;margin-bottom:.6rem}
.mb-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.mb-row:last-child{margin-bottom:0}
.mb-label{font-size:11px;color:#aaa}
.mb-val{font-size:15px;font-weight:600;color:#1a1a1a}
.mb-val.blue{color:#185FA5}
.mb-val.green{color:#3B6D11}
.mb-input-row{display:flex;align-items:center;gap:6px;margin-bottom:.5rem}
.mb-input-row label{font-size:11px;color:#888;white-space:nowrap}
.mb-input-row input{flex:1;height:30px;padding:0 8px;border:1px solid #d0cfc8;border-radius:7px;font-size:13px;font-family:inherit;text-align:right;min-width:0}
.mb-input-row input:focus{outline:none;border-color:#185FA5}
.mb-input-row span{font-size:12px;color:#888}
.divider{height:1px;background:#e8e6e0;margin:.5rem 0}
.empty-cat{text-align:center;padding:3rem;color:#aaa;font-size:13px}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:999;font-size:14px;color:#888;gap:8px}
@media(max-width:640px){.margin-wrap{grid-template-columns:1fr}.header-info{display:none}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay">불러오는 중...</div>
<div class="wrap">
  <h1>원가계산기</h1>
  <div class="tab-bar" id="tabBar"></div>
  <div id="mainContent"></div>
</div>
<script>
const SUPABASE_URL = 'https://htxihjzyjeacpueassvt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0eGloanp5amVhY3B1ZWFzc3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ5MTAsImV4cCI6MjA5NDA5MDkxMH0.trO5wpIPdv7ar_awJZh0umhlKQAUZXoZEQGgRV0EFfE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MENU_CATS = ['생두','티','주스','빵','디저트'];
let ingr = { list:[], cats:[] };
let mstate = {};
MENU_CATS.forEach(c => { mstate[c] = { items:[] }; });
let curTab = '재료 관리';
const dbt = {}; // debounce timers

function debounce(key, fn, ms=400) {
  clearTimeout(dbt[key]);
  dbt[key] = setTimeout(async () => {
    const { error } = await fn();
    if (error) { console.error(key, error); toast('저장 실패: ' + error.message, true); }
  }, ms);
}

function toast(msg, isError=false) {
  let el = document.getElementById('saveToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'saveToast';
    el.style.cssText = 'position:fixed;bottom:1.25rem;right:1.25rem;padding:8px 16px;border-radius:8px;font-size:13px;color:#fff;z-index:9999;transition:opacity .3s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = isError ? '#A32D2D' : '#2d6a2d';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

/* ── 초기 로드 ── */
async function init() {
  loading(true);
  const [catsR, ingrR, menusR, rowsR] = await Promise.all([
    sb.from('cost_ingredient_categories').select('*').order('sort_order'),
    sb.from('cost_ingredients').select('*').order('id'),
    sb.from('cost_menus').select('*').order('sort_order'),
    sb.from('cost_recipe_rows').select('*').order('sort_order')
  ]);

  ingr.cats = (catsR.data||[]).map(c => ({ id:c.id, name:c.name, open:false }));
  ingr.list = (ingrR.data||[]).map(i => ({
    id:i.id, catId:i.cat_id, name:i.name,
    totalQty:i.total_qty, unit:i.unit, totalPrice:i.total_price
  }));

  MENU_CATS.forEach(c => { mstate[c] = { items:[] }; });
  (menusR.data||[]).forEach(m => {
    if (!mstate[m.category]) return;
    const rows = (rowsR.data||[]).filter(r=>r.menu_id===m.id).map(r=>({
      id:r.id, ingrId:r.ingr_id, unit:r.unit,
      totalQty:r.total_qty, totalPrice:r.total_price, useQty:r.use_qty
    }));
    mstate[m.category].items.push({
      id:m.id, name:m.name, open:false,
      marginRate:m.margin_rate??40, sellPrice:m.sell_price??'', recipe:rows
    });
  });

  loading(false);
  renderAll();
}

function loading(v) {
  document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none';
}

/* ── 탭 ── */
function renderAll() { renderTabs(); renderContent(); }
function renderTabs() {
  let html = `<button class="tab${curTab==='재료 관리'?' active':''}" onclick="switchTab('재료 관리')">재료 관리</button>`;
  html += `<div class="sep"></div>`;
  html += MENU_CATS.map(c=>`<button class="tab${c===curTab?' active':''}" onclick="switchTab('${c}')">${c}</button>`).join('');
  document.getElementById('tabBar').innerHTML = html;
}
function switchTab(t) { curTab=t; renderAll(); }
function renderContent() {
  document.getElementById('mainContent').innerHTML =
    curTab==='재료 관리' ? renderIngrHTML() : renderMenuHTML(curTab);
}

/* ══════════════ 재료 관리 ══════════════ */
function renderIngrHTML() {
  const cards = ingr.cats.map(cat => {
    const items = ingr.list.filter(i=>i.catId===cat.id);
    const rows = items.map(ing => {
      const tq=parseFloat(ing.totalQty)||0, tp=parseFloat(ing.totalPrice)||0;
      return `<tr id="ing-${ing.id}">
        <td><input class="ci" value="${esc(ing.name)}" placeholder="재료명"
          oninput="updIngr(${ing.id},'name',this.value)"></td>
        <td><input class="ci r" type="number" min="0" value="${ing.totalQty}" placeholder="0"
          oninput="updIngr(${ing.id},'totalQty',this.value)"></td>
        <td><input class="ci" value="${esc(ing.unit||'g')}" placeholder="g"
          oninput="updIngr(${ing.id},'unit',this.value)"></td>
        <td><input class="ci r" type="number" min="0" value="${ing.totalPrice}" placeholder="0"
          oninput="updIngr(${ing.id},'totalPrice',this.value)"></td>
        <td class="calc-cell" id="iup-${ing.id}">${tq?(tp/tq).toFixed(3):'0.000'}</td>
        <td style="text-align:center">
          <button class="btn sm danger" onclick="removeIngr(${ing.id})" style="padding:0 6px">✕</button>
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="6" style="text-align:center;padding:1rem;color:#aaa;font-size:12px">재료를 추가하세요.</td></tr>`;

    const body = cat.open ? `<div class="cat-body">
        <div class="tbl-wrap"><table>
          <colgroup>
            <col style="width:auto"><col style="width:90px"><col style="width:55px">
            <col style="width:100px"><col style="width:90px"><col style="width:40px">
          </colgroup>
          <thead><tr>
            <th>재료이름</th><th class="r">재료총량</th><th>단위</th>
            <th class="r">재료가격(원)</th><th class="r">단위당(원)</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
        <button class="btn sm" onclick="addIngr(${cat.id})">+ 재료 추가</button>
      </div>` : '';

    return `<div class="cat-card">
      <div class="cat-header${cat.open?'':' closed'}" onclick="handleCatClick(event,${cat.id})">
        <input class="cat-name-input" value="${esc(cat.name)}" placeholder="분류명"
          onclick="event.stopPropagation()" oninput="renameCat(${cat.id},this.value)">
        <span style="font-size:11px;color:#aaa;flex-shrink:0">${items.length}개</span>
        <button class="toggle-btn" onclick="event.stopPropagation();toggleCat(${cat.id})">${cat.open?'▲':'▼'}</button>
        <button class="btn sm danger" onclick="event.stopPropagation();removeCat(${cat.id})">분류 삭제</button>
      </div>
      ${body}
    </div>`;
  }).join('');

  return `<div style="display:flex;justify-content:flex-end;margin-bottom:.75rem">
    <button class="btn primary" onclick="addCat()">+ 분류 추가</button>
  </div>
  ${cards || '<div class="empty-cat">분류를 추가하세요.</div>'}`;
}

/* ── 분류 CRUD ── */
async function addCat() {
  const { data, error } = await sb.from('cost_ingredient_categories')
    .insert({ name:'', sort_order:ingr.cats.length }).select().single();
  if (error) { toast('저장 실패: '+error.message, true); console.error(error); return; }
  ingr.cats.push({ id:data.id, name:'', open:true });
  renderContent();
  const inputs=document.querySelectorAll('.cat-name-input');
  if (inputs.length) inputs[inputs.length-1].focus();
}

async function removeCat(id) {
  const hasItems = ingr.list.some(i=>i.catId===id);
  if (hasItems && !confirm('이 분류의 재료도 모두 삭제됩니다. 계속할까요?')) return;
  loading(true);
  await sb.from('cost_ingredient_categories').delete().eq('id',id);
  ingr.cats = ingr.cats.filter(c=>c.id!==id);
  ingr.list = ingr.list.filter(i=>i.catId!==id);
  loading(false);
  renderContent();
}

function toggleCat(id) {
  const cat=ingr.cats.find(c=>c.id===id); if(!cat) return;
  cat.open=!cat.open; renderContent();
}
function handleCatClick(e, id) {
  if (['INPUT','BUTTON'].includes(e.target.tagName)) return;
  toggleCat(id);
}

function renameCat(id, name) {
  const cat=ingr.cats.find(c=>c.id===id); if(!cat) return;
  cat.name=name;
  debounce(`cat-${id}`, ()=>sb.from('cost_ingredient_categories').update({name}).eq('id',id));
}

/* ── 재료 CRUD ── */
async function addIngr(catId) {
  const { data, error } = await sb.from('cost_ingredients')
    .insert({ cat_id:catId, name:'', total_qty:0, unit:'g', total_price:0 }).select().single();
  if (error) { toast('저장 실패: '+error.message, true); console.error(error); return; }
  ingr.list.push({ id:data.id, catId, name:'', totalQty:'', unit:'g', totalPrice:'' });
  renderContent();
  const trs=document.querySelectorAll('[id^="ing-"]');
  if (trs.length) { const inp=trs[trs.length-1].querySelector('input'); if(inp) inp.focus(); }
}

async function removeIngr(id) {
  await sb.from('cost_ingredients').delete().eq('id',id);
  ingr.list=ingr.list.filter(i=>i.id!==id);
  renderContent();
}

function updIngr(id, field, val) {
  const ing=ingr.list.find(i=>i.id===id); if(!ing) return;
  ing[field]=val;
  if (field==='totalQty'||field==='totalPrice') {
    const tq=parseFloat(ing.totalQty)||0, tp=parseFloat(ing.totalPrice)||0;
    setTxt(`iup-${id}`, tq?(tp/tq).toFixed(3):'0.000');
  }
  debounce(`ingr-${id}`, ()=>sb.from('cost_ingredients').update({
    name:ing.name, total_qty:parseFloat(ing.totalQty)||0,
    unit:ing.unit, total_price:parseFloat(ing.totalPrice)||0
  }).eq('id',id));
}

/* ══════════════ 메뉴 탭 ══════════════ */
function renderMenuHTML(cat) {
  const s=mstate[cat];
  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:.75rem">
    <button class="btn primary" onclick="addItem()">+ 메뉴 추가</button>
  </div>`;
  if (!s.items.length) html+=`<div class="empty-cat">메뉴를 추가하세요.</div>`;
  else html+=s.items.map(item=>renderItemHTML(item)).join('');
  return html;
}

function renderItemHTML(item) {
  const total=itemTotal(item), rate=parseFloat(item.marginRate)||0;
  const sell1=Math.round(total*(1+rate/100));
  return `
  <div class="menu-item" id="mi-${item.id}">
    <div class="menu-header" onclick="handleHeaderClick(event,${item.id})">
      <input class="menu-name-input" id="iname-${item.id}" value="${esc(item.name)}"
        placeholder="메뉴명 입력" onclick="event.stopPropagation()"
        oninput="updItemName(${item.id},this.value)">
      <div class="header-info">
        <span class="hi-label">총원가</span>
        <span class="hi-val gray" id="ihcost-${item.id}">${fmt(Math.round(total))}원</span>
        <span class="hi-label" style="margin-left:4px">판매가</span>
        <span class="hi-val" id="ihsell-${item.id}">${fmt(sell1)}원</span>
      </div>
      <button class="toggle-btn" onclick="event.stopPropagation();toggleItem(${item.id})">${item.open?'▲':'▼'}</button>
      <button class="btn sm danger" onclick="event.stopPropagation();removeItem(${item.id})">삭제</button>
    </div>
    ${item.open?renderBodyHTML(item,total,sell1):''}
  </div>`;
}

function buildIngrOpts(selectedId) {
  if (!ingr.cats.length) return `<option value="">재료 관리에서 먼저 추가하세요</option>`;
  let o=`<option value="">— 선택 —</option>`;
  ingr.cats.forEach(cat => {
    const items=ingr.list.filter(i=>i.catId===cat.id&&i.name);
    if (!items.length) return;
    o+=`<optgroup label="${esc(cat.name||'(미분류)')}">`;
    items.forEach(i=>{ o+=`<option value="${i.id}"${i.id===selectedId?' selected':''}>${esc(i.name)}</option>`; });
    o+=`</optgroup>`;
  });
  return o;
}

function renderBodyHTML(item, total, sell1) {
  const rate=parseFloat(item.marginRate)||0;
  const sp=parseFloat(item.sellPrice)||0;
  const ma2=sp?sp-total:null, r2=(sp&&total)?(sp-total)/total*100:null;

  const rows=item.recipe.map(r=>{
    const tq=parseFloat(r.totalQty)||0, tp=parseFloat(r.totalPrice)||0, uq=parseFloat(r.useQty)||0;
    const unit=tq?tp/tq:0, sub=unit*uq;
    return `<tr id="rr-${item.id}-${r.id}">
      <td><select class="ci" onchange="selectIngr(${item.id},${r.id},this.value)">${buildIngrOpts(r.ingrId)}</select></td>
      <td><input class="ci r" type="number" min="0" value="${r.totalQty}" placeholder="0"
        oninput="updR(${item.id},${r.id},'totalQty',this.value)"></td>
      <td><input class="ci" value="${esc(r.unit||'g')}" placeholder="g"
        oninput="updR(${item.id},${r.id},'unit',this.value)"></td>
      <td><input class="ci r" type="number" min="0" value="${r.totalPrice}" placeholder="0"
        oninput="updR(${item.id},${r.id},'totalPrice',this.value)"></td>
      <td><input class="ci r" type="number" min="0" value="${r.useQty}" placeholder="0"
        oninput="updR(${item.id},${r.id},'useQty',this.value)"></td>
      <td class="calc-cell" id="unit-${item.id}-${r.id}">${unit.toFixed(3)}</td>
      <td class="calc-cell" id="sub-${item.id}-${r.id}" style="color:#1a1a1a;font-weight:500">${fmt(Math.round(sub))}</td>
      <td style="text-align:center;white-space:nowrap">
        <button class="btn sm" onclick="moveRow(${item.id},${r.id},-1)" style="padding:0 5px">▲</button>
        <button class="btn sm" onclick="moveRow(${item.id},${r.id},1)"  style="padding:0 5px">▼</button>
        <button class="btn sm danger" onclick="removeRow(${item.id},${r.id})" style="padding:0 6px">✕</button>
      </td>
    </tr>`;
  }).join('');

  return `<div class="recipe-body">
    <div class="tbl-wrap">
      <table>
        <colgroup>
          <col style="width:160px"><col style="width:85px"><col style="width:55px"><col style="width:90px">
          <col style="width:75px"><col style="width:78px"><col style="width:78px"><col style="width:80px">
        </colgroup>
        <thead><tr>
          <th>재료 선택</th><th class="r">재료총량</th><th>단위</th><th class="r">재료가격(원)</th>
          <th class="r">사용량</th><th class="r">단위당(원)</th><th class="r">소계(원)</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td colspan="6" style="text-align:right;font-size:12px;color:#888">총 원가</td>
          <td style="text-align:right;color:#185FA5" id="itotal-${item.id}">${fmt(Math.round(total))}</td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>
    <button class="btn sm" onclick="addRow(${item.id})" style="margin-bottom:.75rem">+ 재료 추가</button>
    <div class="margin-wrap">
      <div class="margin-block">
        <div class="mb-title">원가 → 판매가</div>
        <div class="mb-input-row">
          <label>마진율</label>
          <input type="number" min="0" max="100" step="0.1" value="${rate}" oninput="updMargin(${item.id},this.value)">
          <span>%</span>
        </div>
        <div class="divider"></div>
        <div class="mb-row"><span class="mb-label">총 원가</span><span class="mb-val" id="icost1-${item.id}">${fmt(Math.round(total))} 원</span></div>
        <div class="mb-row"><span class="mb-label">마진 금액</span><span class="mb-val green" id="imargin1-${item.id}">${fmt(Math.round(sell1-total))} 원</span></div>
        <div class="mb-row"><span class="mb-label">판매가</span><span class="mb-val blue" id="isell1-${item.id}">${fmt(sell1)} 원</span></div>
      </div>
      <div class="margin-block">
        <div class="mb-title">판매가 → 마진율 역산</div>
        <div class="mb-input-row">
          <label>판매가</label>
          <input type="number" min="0" step="100" value="${item.sellPrice||''}" placeholder="입력" oninput="updSell(${item.id},this.value)">
          <span>원</span>
        </div>
        <div class="divider"></div>
        <div class="mb-row"><span class="mb-label">총 원가</span><span class="mb-val" id="icost2-${item.id}">${fmt(Math.round(total))} 원</span></div>
        <div class="mb-row"><span class="mb-label">마진 금액</span><span class="mb-val green" id="imargin2-${item.id}">${ma2!=null?fmt(Math.round(ma2))+' 원':'— 원'}</span></div>
        <div class="mb-row"><span class="mb-label">마진율</span><span class="mb-val blue" id="irate2-${item.id}">${r2!=null?r2.toFixed(1)+' %':'— %'}</span></div>
      </div>
    </div>
  </div>`;
}

/* ── 메뉴 CRUD ── */
async function addItem() {
  const s=mstate[curTab];
  const { data, error } = await sb.from('cost_menus')
    .insert({ category:curTab, name:'', margin_rate:40, sort_order:s.items.length }).select().single();
  if (error) { toast('저장 실패: '+error.message, true); console.error(error); return; }
  s.items.push({ id:data.id, name:'', open:true, marginRate:40, sellPrice:'', recipe:[] });
  renderContent();
  const el=document.getElementById(`iname-${data.id}`); if(el) el.focus();
}

async function removeItem(id) {
  if (!confirm('이 메뉴를 삭제할까요?')) return;
  loading(true);
  await sb.from('cost_menus').delete().eq('id',id);
  mstate[curTab].items=mstate[curTab].items.filter(i=>i.id!==id);
  loading(false);
  renderContent();
}

function toggleItem(id) { const i=getItem(id); i.open=!i.open; renderContent(); }

function updItemName(id, val) {
  const item=getItem(id); if(!item) return;
  item.name=val;
  debounce(`menu-${id}-name`, ()=>sb.from('cost_menus').update({name:val}).eq('id',id));
}

function updMargin(itemId, val) {
  const item=getItem(itemId); if(!item) return;
  item.marginRate=val; refreshTotals(itemId);
  debounce(`menu-${itemId}-margin`, ()=>sb.from('cost_menus').update({margin_rate:parseFloat(val)||0}).eq('id',itemId));
}

function updSell(itemId, val) {
  const item=getItem(itemId); if(!item) return;
  item.sellPrice=val; refreshTotals(itemId);
  debounce(`menu-${itemId}-sell`, ()=>sb.from('cost_menus').update({sell_price:parseFloat(val)||null}).eq('id',itemId));
}

/* ── 레시피 CRUD ── */
async function addRow(itemId) {
  const item=getItem(itemId);
  const { data, error } = await sb.from('cost_recipe_rows')
    .insert({ menu_id:itemId, ingr_id:null, unit:'g', total_qty:0, total_price:0, use_qty:0, sort_order:item.recipe.length })
    .select().single();
  if (error) { toast('저장 실패: '+error.message, true); console.error(error); return; }
  item.recipe.push({ id:data.id, ingrId:null, unit:'g', totalQty:'', totalPrice:'', useQty:'' });
  renderContent();
}

async function removeRow(itemId, rowId) {
  await sb.from('cost_recipe_rows').delete().eq('id',rowId);
  const item=getItem(itemId);
  item.recipe=item.recipe.filter(r=>r.id!==rowId);
  renderContent();
}

async function moveRow(itemId, rowId, dir) {
  const item=getItem(itemId);
  const idx=item.recipe.findIndex(r=>r.id===rowId), t=idx+dir;
  if (t<0||t>=item.recipe.length) return;
  [item.recipe[idx],item.recipe[t]]=[item.recipe[t],item.recipe[idx]];
  renderContent();
  await Promise.all(item.recipe.map((r,i)=>
    sb.from('cost_recipe_rows').update({sort_order:i}).eq('id',r.id)
  ));
}

async function selectIngr(itemId, rowId, ingrIdStr) {
  const item=getItem(itemId), row=item.recipe.find(r=>r.id===rowId);
  if (!row) return;
  const ingrId=ingrIdStr?parseInt(ingrIdStr):null;
  row.ingrId=ingrId;
  if (ingrId) {
    const ing=ingr.list.find(i=>i.id===ingrId);
    if (ing) { row.unit=ing.unit||'g'; row.totalQty=ing.totalQty; row.totalPrice=ing.totalPrice; }
  }
  renderContent();
  await sb.from('cost_recipe_rows').update({
    ingr_id:ingrId, unit:row.unit,
    total_qty:parseFloat(row.totalQty)||0, total_price:parseFloat(row.totalPrice)||0
  }).eq('id',rowId);
}

function updR(itemId, rowId, field, val) {
  const item=getItem(itemId), row=item.recipe.find(r=>r.id===rowId);
  if (!row) return;
  row[field]=val;
  const tq=parseFloat(row.totalQty)||0, tp=parseFloat(row.totalPrice)||0, uq=parseFloat(row.useQty)||0;
  const unit=tq?tp/tq:0;
  setTxt(`unit-${itemId}-${rowId}`, unit.toFixed(3));
  setTxt(`sub-${itemId}-${rowId}`,  fmt(Math.round(unit*uq)));
  refreshTotals(itemId);
  debounce(`row-${rowId}`, ()=>sb.from('cost_recipe_rows').update({
    unit:row.unit, total_qty:parseFloat(row.totalQty)||0,
    total_price:parseFloat(row.totalPrice)||0, use_qty:parseFloat(row.useQty)||0
  }).eq('id',rowId));
}

/* ── 계산 / DOM 패치 ── */
function itemTotal(item) {
  return item.recipe.reduce((s,r)=>{
    const tq=parseFloat(r.totalQty)||0, tp=parseFloat(r.totalPrice)||0, uq=parseFloat(r.useQty)||0;
    return s+(tq?tp/tq*uq:0);
  },0);
}

function refreshTotals(itemId) {
  const item=getItem(itemId), total=itemTotal(item);
  const rate=parseFloat(item.marginRate)||0, sell1=Math.round(total*(1+rate/100));
  const sp=parseFloat(item.sellPrice)||0;
  setTxt(`itotal-${itemId}`,   fmt(Math.round(total)));
  setTxt(`ihcost-${itemId}`,   fmt(Math.round(total))+'원');
  setTxt(`ihsell-${itemId}`,   fmt(sell1)+'원');
  setTxt(`icost1-${itemId}`,   fmt(Math.round(total))+' 원');
  setTxt(`icost2-${itemId}`,   fmt(Math.round(total))+' 원');
  setTxt(`imargin1-${itemId}`, fmt(Math.round(sell1-total))+' 원');
  setTxt(`isell1-${itemId}`,   fmt(sell1)+' 원');
  if (sp&&total) {
    setTxt(`imargin2-${itemId}`, fmt(Math.round(sp-total))+' 원');
    setTxt(`irate2-${itemId}`,   ((sp-total)/total*100).toFixed(1)+' %');
  } else {
    setTxt(`imargin2-${itemId}`, '— 원');
    setTxt(`irate2-${itemId}`,   '— %');
  }
}

function handleHeaderClick(e,id) {
  if (['INPUT','BUTTON','SELECT'].includes(e.target.tagName)) return;
  toggleItem(id);
}

/* ── 유틸 ── */
function getItem(id) { return mstate[curTab].items.find(i=>i.id===id); }
function setTxt(id,v) { const el=document.getElementById(id); if(el) el.textContent=v; }
function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
